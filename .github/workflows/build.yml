name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build
        working-directory: Server
        run: |
          cargo zigbuild \
            --profile max \
            --target x86_64-unknown-linux-gnu.2.31

      - name: Package
        run: |
          set -euxo pipefail

          mkdir -p dist/lib

          cp Server/target/x86_64-unknown-linux-gnu.2.31/max/ripguard dist/
          cp Server/lib/libonnxruntime.so dist/lib/

          tar -czf ripguard-linux.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ripguard-linux
          path: ripguard-linux.tar.gz
